<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNSB Character Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #121214;
    --bg-panel: #1c1c21;
    --bg-card: #26262d;
    --accent: #ff6b4a;
    --accent-soft: #ff6b4a22;
    --text: #e8e6e3;
    --text-muted: #8a8a8e;
    --active: #a78bfa;
    --active-bg: #a78bfa33;
    --border: #333338;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Left Panel */
  .panel {
    width: 460px;
    min-width: 460px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 24px;
    gap: 20px;
  }

  .panel h1 {
    font-size: 24px;
    color: var(--accent);
    font-weight: 600;
  }
  .twitter-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--bg-card);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.15s;
  }
  .twitter-btn:hover { color: var(--text); border-color: #555; }
  .twitter-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* Character selector */
  .char-select {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  /* Preset buttons */
  .section-label {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .preset-btn {
    padding: 8px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { background: #333338; color: var(--text); }
  .preset-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px var(--accent-soft);
    transform: translateY(-1px);
  }

  /* Layer groups */
  .group {
    background: var(--bg-card);
    border-radius: 8px;
    overflow: hidden;
  }

  .group-header {
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .group-header:hover { color: var(--text); }
  .group-header .arrow {
    transition: transform 0.2s;
    font-size: 12px;
  }
  .group.collapsed .arrow { transform: rotate(-90deg); }

  .group-options {
    padding: 6px 14px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 9999px;
    overflow: hidden;
    transition: max-height 0.25s ease, padding 0.25s ease;
  }
  .group.collapsed .group-options {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  .group-status {
    font-size: 12px;
    font-weight: 400;
    color: var(--active);
    margin-left: 8px;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .layer-btn {
    padding: 6px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .layer-btn:hover:not(:disabled) { border-color: #555; color: var(--text); }
  .layer-btn.active {
    background: var(--active-bg);
    border-color: var(--active);
    color: #fff;
  }
  .layer-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .none-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px dashed #444;
    border-radius: 5px;
    color: #555;
    font-size: 14px;
    cursor: pointer;
  }
  .none-btn:hover { border-color: #777; color: var(--text-muted); }
  .none-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Advanced mode */
  .advanced-toggle {
    width: 100%;
    padding: 10px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .advanced-toggle:hover { color: var(--text); }
  .advanced-toggle.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .group-advanced {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    max-height: 9999px;
    overflow: hidden;
    transition: max-height 0.25s ease, padding 0.25s ease;
  }
  .group.collapsed .group-advanced {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }
  .group-advanced .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-advanced .slider-row label {
    width: 14px;
    flex-shrink: 0;
  }
  .group-advanced input[type="range"] {
    flex: 1;
    min-width: 0;
  }
  .group-advanced .slider-value {
    width: 50px;
    padding: 2px 4px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .group-advanced .slider-value:focus {
    outline: none;
    border-color: var(--active);
  }
  .group-advanced .slider-value::-webkit-inner-spin-button,
  .group-advanced .slider-value::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .group-advanced .slider-value { -moz-appearance: textfield; }
  .slider-step {
    width: 24px;
    height: 24px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slider-step:hover { color: var(--text); border-color: #555; }
  .slider-reset {
    margin-top: 4px;
    padding: 6px 12px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    align-self: flex-start;
  }
  .slider-reset:hover { color: var(--text); border-color: #555; }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
    padding-top: 12px;
  }

  .action-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 600;
  }
  .reset-btn { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }
  .reset-btn:hover { background: #333338; color: var(--text); }
  .export-btn { background: var(--accent); color: #fff; transition: all 0.2s; }
  .export-btn:hover { background: #ff8266; }
  .export-btn.exported {
    background: #27ae60;
    pointer-events: none;
  }

  .disclaimer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-muted);
  }

  /* Scrollbar */
  .panel::-webkit-scrollbar { width: 12px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  .panel::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Right Preview */
  .preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: radial-gradient(ellipse at 50% 60%, #1e1e24 0%, #0a0a0c 70%);
    overflow: hidden;
    position: relative;
  }
  .preview.bg-white { background: #ffffff; }

  .preview-container {
    position: relative;
    width: 500px;
    aspect-ratio: 1 / 2;
    transform-origin: center center;
    transition: transform 0.15s ease;
    cursor: grab;
  }
  .preview-container.dragging { cursor: grabbing; transition: none; }

  .preview-container img,
  .preview-container canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    z-index: 100;
  }

  .zoom-btn {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-panel);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .zoom-btn:hover { opacity: 1; background: var(--bg-card); }
</style>
</head>
<body>

<div class="panel">
  <h1>MNSB Character Editor</h1>

  <select class="char-select" id="charSelect"></select>

  <button class="advanced-toggle" id="advancedToggle">Advanced</button>

  <div id="headSelectorSection" style="display:none">
    <div class="section-label">Head</div>
    <div class="presets" id="headSelector"></div>
  </div>

  <div>
    <div class="section-label">Expression</div>
    <div class="presets" id="presets"></div>
  </div>

  <div id="groups"></div>

  <div class="actions">
    <button class="action-btn reset-btn" id="resetBtn">Reset</button>
    <button class="action-btn export-btn" id="exportBtn">Export PNG</button>
  </div>

  <a class="twitter-btn" href="https://twitter.com/thecasterian" target="_blank" rel="noopener noreferrer" aria-label="Twitter @thecasterian" title="@thecasterian">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/>
    </svg>
    <span>@thecasterian</span>
  </a>

  <p class="disclaimer">
    All character images and assets are the property of Re,AER / Acacia. This is an unofficial fan-made tool, not affiliated with or endorsed by the rights holders.
  </p>
</div>

<div class="preview" id="previewArea">
  <div class="preview-container" id="previewContainer"></div>
  <div class="zoom-controls">
    <button class="zoom-btn" id="bgToggle" style="font-size:14px" title="Toggle preview background">BG</button>
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">&minus;</button>
    <button class="zoom-btn" id="zoomReset" style="font-size:14px">1:1</button>
  </div>
</div>

<script>
const CHARACTERS = [
  "Alisa","AnAn","Coco","Ema","Hanna","Hiro",
  "Leia","Margo","Meruru","Miria","Nanoka","Noah","Sherry"
];

let currentChar = null;
let layersInfo = [];       // from layers.json
let compositions = {};     // from composition.txt
let defaultEnabled = [];   // resolved default list for current active head
let defaultJsonRaw = {};   // raw default.json (may be flat or per-head)
let headBases = [];        // e.g. ['Head01', 'Head02'] if multi-head
let activeHead = null;     // currently active head base name
let activeState = {};      // { layerName: true/false }
let clippingData = {};     // from clipping.json: { layerName: { target, blend } }
let cacheBust = Date.now();
let advancedMode = false;
let groupOffsets = {};     // { displayGroupPath: { dx, dy } } — facial groups only

function isFacialGroup(groupPath) {
  if (groupPath.startsWith('__')) return false; // synthetic mask buckets
  const leaf = groupPath.split('/').pop();
  return /^(Eyes|Mouth)\d*$/.test(leaf);
}

function getLayerOffset(layer) {
  const o = groupOffsets[getDisplayGroup(layer)];
  if (!o) return { dx: 0, dy: 0, scale: 1, rotate: 0 };
  return { dx: o.dx || 0, dy: o.dy || 0, scale: o.scale ?? 1, rotate: o.rotate || 0 };
}

// Sprite top-left in canvas space. Layers without `pos` are canvas-sized PNGs
// drawn at canvas origin; `pos` PNGs are tightly cropped sprites placed at the
// recorded position. Both schemas coexist during the rollout — the renderer
// just adds `pos` to every drawImage / mask op.
function getPos(layer) {
  return layer.pos || [0, 0];
}

// --- Data Loading ---

async function loadCharacter(name) {
  currentChar = name;

  cacheBust = Date.now();
  invalidateImageCache();
  groupOffsets = {};
  const [layersJson, compsJson, defaultJson, clippingJson] = await Promise.all([
    fetch(`characters/${name}/layers.json?v=${cacheBust}`).then(r => r.json()),
    fetch(`characters/${name}/compositions.json?v=${cacheBust}`).then(r => r.json()),
    fetch(`characters/${name}/default.json?v=${cacheBust}`).then(r => r.json()),
    fetch(`characters/${name}/clipping.json?v=${cacheBust}`).then(r => r.ok ? r.json() : {}),
  ]);

  layersInfo = layersJson.layers.filter(l => !l.empty);
  const canvasSize = layersJson.canvas_size || [2500, 5000];
  layersInfo.forEach(l => { l._canvasW = canvasSize[0]; l._canvasH = canvasSize[1]; });
  compositions = compsJson;
  defaultJsonRaw = defaultJson || {};
  clippingData = clippingJson || {};

  // Detect head bases (Head01, Head02, etc.)
  const headSet = new Set();
  for (const l of layersInfo) {
    const match = l.group.match(/Head(\d+)/);
    if (match) headSet.add('Head' + match[1]);
  }
  headBases = [...headSet].sort();
  if (headBases.length > 1) {
    // Per-head shape: pick first head that has a block; else legacy fallback via HeadBase entry
    const perHead = headBases.find(h => defaultJsonRaw[h]);
    if (perHead) {
      activeHead = perHead;
    } else {
      const legacy = (defaultJsonRaw.enabled || []).find(n => n.startsWith('HeadBase'));
      activeHead = legacy ? 'Head' + legacy.replace('HeadBase', '') : headBases[0];
    }
  } else {
    activeHead = null;
  }
  defaultEnabled = computeDefaultEnabled();

  // Reset zoom/pan on character switch
  zoomLevel = 1; panX = 0; panY = 0;
  const pc = document.getElementById('previewContainer');
  if (pc) pc.style.transform = '';

  resetToDefault();
  enforceDeps();
  buildHeadSelector();
  buildUI();
  renderPreview();
}

// --- Clipping Mask ---

function getClipInfo(name) {
  const info = clippingData[name];
  if (!info) return null;
  return { target: info.target, blendMode: info.blend || 'source-over', head: info.head || null };
}

function isClipMaskLayer(l) {
  return getClipInfo(l.name) !== null;
}

function isToggleableClipMask(l) {
  const info = getClipInfo(l.name);
  if (info === null) return false;
  // Canvas-target masks (Pale) are user-toggleable expression effects.
  if (info.target === 'canvas') return true;
  return info.blendMode === 'source-over';
}

function isAlwaysOnClipMask(l) {
  return isClipMaskLayer(l) && !isToggleableClipMask(l);
}

function getDisplayGroup(l) {
  if (!isToggleableClipMask(l)) return l.group;
  const info = getClipInfo(l.name);
  // Canvas-multiply masks get their own UI buckets keyed by the relevant
  // source-group segment so siblings stay together while per-head buckets
  // (e.g. Ema's ".../Head01/...") stay separated. Each mask family routes
  // to its own bucket: Effect_* → __EffectMask__, Shadow_* → __ShadowMask__,
  // Pale → __PaleMask__ (default).
  if (info && info.target === 'canvas') {
    const segments = l.group.split('/');
    const headMatch = l.group.match(/Head\d+/);
    const headPrefix = headMatch ? `${headMatch[0]}/` : '';
    // Option_Arm*_Back layers are shadow effects whose group has no Shadow
    // segment — detect by name and bucket by the parent Option_Arm segment so
    // all variants under one Option_Arm group gather into a single section.
    if (/^Option_Arm.*_Back$/.test(l.name)) {
      const optSeg = segments.find(s => /^Option_Arm/.test(s));
      if (optSeg) return `__ShadowMask__/${headPrefix}${optSeg}`;
    }
    for (const [bucket, regex] of [
      ['__EffectMask__', /^Effect/],
      ['__ShadowMask__', /^Shadow/],
    ]) {
      const seg = [...segments].reverse().find(s => regex.test(s));
      if (seg) return `${bucket}/${headPrefix}${seg}`;
    }
    const paleSegment = [...segments].reverse().find(s => /^Pale/.test(s)) || 'Pale';
    return `__PaleMask__/${headPrefix}${paleSegment}`;
  }
  if (headBases.length <= 1) return '__ClippingMasks__';
  const headMatch = l.group.match(/Head\d+/);
  return headMatch ? `__ClippingMasks__/${headMatch[0]}` : '__ClippingMasks__';
}

function isInClipTarget(layer, target) {
  if (isClipMaskLayer(layer)) return false;
  const group = layer.group;
  const segments = group.split('/');
  if (target === 'facial') {
    if (segments.some(s => /^Facial\d*$/.test(s))) return true;
    // Flat-hierarchy characters (e.g. Meruru) skip the Facial## group and
    // park facial features directly under Head##; recognize them by leaf.
    const underHead = segments.some(s => /^Head\d*$/.test(s));
    return underHead && segments.some(s => /^(Mouth|Cheeks|Pale|Sweat)\d*$/.test(s));
  }
  if (target === 'eyes') return segments.some(s => /^Eyes\d*$/.test(s));
  return false;
}

// --- State Management ---

function computeDefaultEnabled() {
  // New per-head shape: { Head01: { enabled: [...] }, Head02: { enabled: [...] } }
  if (activeHead && defaultJsonRaw[activeHead]) {
    return defaultJsonRaw[activeHead].enabled || [];
  }
  // Legacy flat shape: { enabled: [...] }
  return defaultJsonRaw.enabled || [];
}

function resetToDefault() {
  activeState = {};
  for (const l of layersInfo) {
    // Non-toggleable clip masks (destination-out, pool-multiply) are always on;
    // everything else is on iff listed in the resolved default.
    activeState[l.name] = isAlwaysOnClipMask(l) || defaultEnabled.includes(l.name);
  }
}

function enforceDeps() {
  // If a required layer is off, turn off all layers that depend on it.
  // Iterate until stable so chained requirements (A→B→C) all collapse.
  let changed = true;
  while (changed) {
    changed = false;
    for (const l of layersInfo) {
      const reqs = getRequires(l);
      if (reqs.length && activeState[l.name] && !reqs.every(r => activeState[r])) {
        activeState[l.name] = false;
        changed = true;
      }
    }
  }
}

// Layers with `auto_enable: true` follow their `requires` parent on the
// off→on transition: when the user activates the parent, dependents flip on
// once. The user can disable them manually afterward and they stay off until
// the parent toggles off→on again.
function autoEnableDependents(layerName) {
  for (const dep of layersInfo) {
    const reqs = getRequires(dep);
    if (dep.auto_enable && reqs.includes(layerName) && reqs.every(r => activeState[r])) {
      activeState[dep.name] = true;
    }
  }
}

// Normalize the `requires` field to a list. A layer may declare `requires`
// as a single layer name (string) or a list of names (array); both forms
// mean "all listed layers must be active for this one to remain enabled".
function getRequires(layer) {
  if (!layer.requires) return [];
  return Array.isArray(layer.requires) ? layer.requires : [layer.requires];
}

// Group exclusion / fallback engine. Layers may declare:
//   excludes_groups: [groupLeaf, ...]     — clear these groups when I activate
//   requires_groups: { groupLeaf: name }  — when I'm cleared, ensure these
//                                           groups have a layer; if empty,
//                                           fall back to `name`.
// Single-side declaration: e.g. only Arms layers carry the rule, and
// activating an ArmL/ArmR layer clears Arms via the inverse scan in step (2).
function applyClearedFallbacks(clearedLayers, excludesContext) {
  for (const ol of clearedLayers) {
    if (!ol.requires_groups) continue;
    for (const [gleaf, defaultName] of Object.entries(ol.requires_groups)) {
      // Don't repopulate a group the activator just forbade.
      if (excludesContext && excludesContext.includes(gleaf)) continue;
      const groupHasActive = layersInfo.some(x =>
        x.group.split('/').pop() === gleaf && activeState[x.name]);
      if (!groupHasActive && activeState.hasOwnProperty(defaultName)) {
        activeState[defaultName] = true;
        autoEnableDependents(defaultName);
      }
    }
  }
}

function enforceExclusions(activatedName) {
  const me = layersInfo.find(l => l.name === activatedName);
  if (!me) return;
  const myLeaf = me.group.split('/').pop();
  const cleared = [];

  // (1) Clear groups I exclude.
  if (me.excludes_groups) {
    for (const gleaf of me.excludes_groups) {
      for (const ol of layersInfo) {
        if (ol.group.split('/').pop() === gleaf && activeState[ol.name]) {
          activeState[ol.name] = false;
          cleared.push(ol);
        }
      }
    }
  }

  // (2) Inverse: any active layer whose excludes_groups names my group
  //     gets cleared because I'm now in that group.
  for (const ol of layersInfo) {
    if (ol === me) continue;
    if (ol.excludes_groups && ol.excludes_groups.includes(myLeaf) && activeState[ol.name]) {
      activeState[ol.name] = false;
      cleared.push(ol);
    }
  }

  // (3) Fallbacks from each cleared layer's requires_groups, suppressed
  //     for any group I forbid.
  applyClearedFallbacks(cleared, me.excludes_groups);
}


function applyPreset(presetName) {
  const enabled = compositions[presetName];
  if (!enabled) return;

  // Turn off all facial layers, then enable the preset's list
  const facialKeywords = ['Eyes', 'Mouth', 'Cheeks', 'Pale', 'Sweat', 'Mask'];
  const isFacial = name => facialKeywords.some(k => name.includes(k));

  // Only clear facial layers belonging to the active head (or all if single head).
  // Pool-target clip masks (source-over / destination-out / pool-multiply) stay
  // preset-independent; canvas-target masks (Pale) are toggled by presets.
  for (const l of layersInfo) {
    const info = getClipInfo(l.name);
    if (info && info.target !== 'canvas') continue;
    if (isFacial(l.name)) {
      if (!activeHead || l.group.includes(activeHead)) {
        activeState[l.name] = false;
      }
    }
  }

  // Enable the preset layers
  for (const name of enabled) {
    if (activeState.hasOwnProperty(name)) {
      activeState[name] = true;
    }
  }
}

// --- UI Building ---

function buildHeadSelector() {
  const section = document.getElementById('headSelectorSection');
  const container = document.getElementById('headSelector');
  container.innerHTML = '';

  if (headBases.length <= 1) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';
  for (const head of headBases) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (head === activeHead ? ' active' : '');
    btn.textContent = head;
    btn.onclick = () => {
      const oldHead = activeHead;
      const belongsToHead = (l, h) => {
        if (l.group.includes(h)) return true;
        const m = l.name.match(/Head(\d+)/);
        return !!(m && 'Head' + m[1] === h);
      };
      // Turn off all layers of the old head (matched by group OR by Head## suffix in name).
      // Always-on clip masks are head-scoped at render time, not state time — leave them on.
      for (const l of layersInfo) {
        if (belongsToHead(l, oldHead) && !isAlwaysOnClipMask(l)) activeState[l.name] = false;
      }
      activeHead = head;
      defaultEnabled = computeDefaultEnabled();
      // Enable head-scoped layers from the new head's default
      // (HeadBase, FacialLineDrawing, OptionB_Head*, HairB*, etc.)
      for (const l of layersInfo) {
        if (belongsToHead(l, head) && defaultEnabled.includes(l.name)) {
          activeState[l.name] = true;
        }
      }
      // Fallback: ensure HeadBase is on even if missing from default
      const base = layersInfo.find(l => l.name === 'HeadBase' + head.replace('Head', ''));
      if (base) activeState[base.name] = true;
      // Apply Normal expression for the new head
      const headNum = head.replace('Head', '').replace(/^0+/, '');
      const normalPreset = 'Normal' + headNum;
      if (compositions[normalPreset]) {
        applyPreset(normalPreset);
      }
      // Update head buttons
      for (const b of container.querySelectorAll('.preset-btn')) {
        b.classList.toggle('active', b.textContent === head);
      }
      buildUI();
      renderPreview();
    };
    container.appendChild(btn);
  }
}

function isGroupForActiveHead(groupPath) {
  if (!activeHead) return true; // single head, show all
  // If group contains a Head## marker, only show if it matches activeHead
  const match = groupPath.match(/Head(\d+)/);
  if (!match) return true; // not head-specific, always show
  return 'Head' + match[1] === activeHead;
}

function isLayerForActiveHead(name) {
  if (!activeHead) return true;
  // For shared groups (e.g. OptionB) where head-specific layers live side by side,
  // filter by Head## marker in the layer name itself.
  const match = name.match(/Head(\d+)/);
  if (!match) return true;
  return 'Head' + match[1] === activeHead;
}

function buildUI() {
  buildPresets();
  buildGroups();
}

function buildPresets() {
  const container = document.getElementById('presets');
  container.innerHTML = '';

  // Find expression presets (compositions that set Eyes + Mouth)
  const expressionNames = ['Normal','Smile','Angry','Pensive','Cry','Flushed','Surprised','Fearful','Wink','Sparkle','Determined'];
  // For multi-head: filter to presets matching the active head number
  const headNum = activeHead ? activeHead.replace('Head', '').replace(/^0+/, '') : null;
  const presets = Object.keys(compositions).filter(k => {
    if (!expressionNames.some(e => k.startsWith(e))) return false;
    if (!headNum) return true; // single head, show all
    // Match presets ending with the head number (Normal1 for Head01, Normal2 for Head02)
    // Also include presets without a number suffix or aliased (Smile, Angry, etc.)
    const trailingNum = k.match(/(\d+)$/);
    if (!trailingNum) return true; // no number, show always (alias like "Smile")
    return trailingNum[1] === headNum;
  });

  // Deduplicate: prefer short names
  const seen = new Set();
  const uniquePresets = [];
  for (const p of presets) {
    const base = p.replace(/\d+$/, '');
    if (!seen.has(base)) {
      seen.add(base);
      uniquePresets.push(p);
    }
  }

  for (const name of uniquePresets) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.dataset.preset = name;
    btn.textContent = name.replace(/\d+$/, '');
    btn.onclick = () => {
      applyPreset(name);
      enforceDeps();
      updateUI();
      renderPreview();
    };
    container.appendChild(btn);
  }
}

function buildGroups() {
  const container = document.getElementById('groups');
  container.innerHTML = '';

  // Group layers by their group path. Toggleable clip masks are rerouted into a
  // synthetic "__ClippingMasks__" group so they appear in a dedicated UI section.
  // Preserve any Head## segment so per-head filtering still works.
  const groups = new Map();
  for (const l of layersInfo) {
    const key = getDisplayGroup(l);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(l);
  }

  // Simplify group names for display
  function displayName(group) {
    if (group.startsWith('__ClippingMasks__')) return 'Clipping Masks';
    const parts = group.split('/');
    return parts[parts.length - 1];
  }

  // Sort groups: facial first, arms second, everything else last
  // Strict total order so the panel layout is identical across every
  // character. Earlier versions used coarse buckets that left ties; sort
  // stability then exposed file-iteration order, which differs per
  // character. Each leaf gets a distinct rank.
  function groupOrder(path) {
    if (path.startsWith('__PaleMask__')) return 3;
    if (path.startsWith('__ClippingMasks__')) return 30;

    // __ShadowMask__/Option_Arm* (Option_*_Back shadows) ride alongside their
    // parent limb (Option_Arm groups at 20+limb*2; shadow at 21+limb*2). E.g.
    // AnAn: Option_ArmR variants (22) → Option_ArmR shadow (23) → Option_Arms
    // (24), so Option_Arms doesn't get sandwiched mid-ArmR cluster.
    if (path.startsWith('__ShadowMask__/')) {
      const sub = path.split('/').pop();
      if (sub.startsWith('Option_Arm')) {
        const limb = sub.includes('ArmL') ? 0 : sub.includes('ArmR') ? 1 : 2;
        return 21 + limb * 2;
      }
    }

    const leaf = path.split('/').pop();

    // Facial features
    if (leaf.includes('Eyes')) return 0;
    if (leaf.includes('Mouth')) return 1;
    if (leaf.includes('Cheeks')) return 2;
    // Pale falls here only if a Pale group is ever a non-synthetic leaf;
    // currently every Pale layer is a clip mask routed to __PaleMask__.
    if (leaf.includes('Pale')) return 3;
    if (leaf.includes('Sweat')) return 4;
    if (leaf.includes('Mask')) return 5;

    // OptionB top-level group (Hiro/Nanoka) sits right before Clipping Masks
    // (rank 30), after the Option_Arm clusters.
    if (leaf === 'OptionB') return 29;

    // Arms: category first, then limb (L → R → combined within each category)
    if (leaf.includes('Arm')) {
      const limb = leaf.includes('ArmL') ? 0 : leaf.includes('ArmR') ? 1 : 2;
      if (leaf === 'ArmL' || leaf === 'ArmR' || leaf === 'Arms') return 10 + limb;
      // limb*2 leaves room for __ShadowMask__/Option_Arm* shadow buckets to
      // slot in between limbs (see the synthetic-bucket branch above).
      if (leaf.startsWith('Option_Arm')) return 20 + limb * 2;
      // Effects come AFTER __ClippingMasks__ (rank 30).
      if (leaf.startsWith('Effect_Front_Arm')) return 40 + limb;
      if (leaf.startsWith('Effect_Middle_Arm')) return 50 + limb;
      if (leaf.startsWith('Effect_Back_Arm')) return 60 + limb;
      if (leaf.startsWith('Shadow_Arm')) return 70 + limb;
      return 80 + limb;
    }
    return 100;
  }
  const sortedGroups = [...groups.entries()].sort((a, b) => groupOrder(a[0]) - groupOrder(b[0]));

  for (const [groupPath, layers] of sortedGroups) {
    // Skip groups whose layers are all always-on (Body, HeadBase, HairB, non-source-over masks)
    if (layers.every(l => l.name === 'Body' || /^Body\d+$/.test(l.name) || l.name.startsWith('HeadBase') || l.name.startsWith('HairB') || isAlwaysOnClipMask(l))) continue;
    // Skip groups belonging to inactive head
    if (!isGroupForActiveHead(groupPath)) continue;
    // Skip groups with no selectable buttons for the active head — e.g. Meruru's
    // OptionF on Head02, where every entry is name-tagged Head01 and would
    // otherwise render an empty section with just the None button.
    if (!layers.some(l => !isAlwaysOnClipMask(l) && isLayerForActiveHead(l.name))) continue;

    const div = document.createElement('div');
    div.className = 'group';

    const header = document.createElement('div');
    header.className = 'group-header';
    const titleSpan = document.createElement('span');
    titleSpan.textContent = displayName(groupPath);
    const statusSpan = document.createElement('span');
    statusSpan.className = 'group-status';
    statusSpan.dataset.statusGroup = groupPath;
    titleSpan.appendChild(statusSpan);
    const arrowSpan = document.createElement('span');
    arrowSpan.className = 'arrow';
    arrowSpan.textContent = '▼';
    header.appendChild(titleSpan);
    header.appendChild(arrowSpan);
    header.onclick = () => div.classList.toggle('collapsed');
    div.appendChild(header);

    const opts = document.createElement('div');
    opts.className = 'group-options';

    // "None" button
    const noneBtn = document.createElement('button');
    noneBtn.className = 'none-btn';
    noneBtn.textContent = 'None';
    noneBtn.dataset.group = groupPath;
    noneBtn.onclick = () => {
      // Collect what we actually clear so cleared layers can drive their
      // requires_groups fallbacks (e.g. clearing Arms repopulates ArmL/ArmR).
      const cleared = [];
      for (const l of layers) {
        if (isAlwaysOnClipMask(l)) continue; // non-source-over masks always on
        if (!isLayerForActiveHead(l.name)) continue; // don't touch layers belonging to inactive head
        if (activeState[l.name]) cleared.push(l);
        activeState[l.name] = false;
      }
      applyClearedFallbacks(cleared);
      enforceDeps();
      updateUI();
      renderPreview();
    };
    opts.appendChild(noneBtn);

    for (const l of layers) {
      if (isAlwaysOnClipMask(l)) continue; // non-source-over masks always on, not user-selectable
      if (!isLayerForActiveHead(l.name)) continue; // hide layers that belong to a different head
      const btn = document.createElement('button');
      btn.className = 'layer-btn';
      btn.textContent = l.name
        .replace(/^ClippingMask_/, '')
        .replace(/^(Eyes|Mouth|Cheeks|Sweat|Pale)\d+_/, '')
        .replace(/^(ArmL|ArmR|Eyes_|Mouth_|Cheeks_|Sweat|Pale)/, '')
        .replace(/^_/, '') || l.name;
      btn.dataset.layer = l.name;
      btn.dataset.group = groupPath;
      btn.onclick = () => {
        const leaf = groupPath.split('/').pop();
        const multiSelect = (leaf === 'Facial' || leaf === 'ClippingMask' || leaf === 'Angle01'
          || /^Head\d+$/.test(leaf)
          || groupPath.startsWith('__ClippingMasks__'));

        const activated = [];
        const radioCleared = [];
        if (multiSelect) {
          // Toggle behavior: flip this layer on/off
          activeState[l.name] = !activeState[l.name];
          if (activeState[l.name]) activated.push(l.name);
        } else {
          // Radio behavior: turn off all in group, turn on this one —
          // but additively preserve the clicked layer's `requires` chain.
          const keepOn = new Set([l.name]);
          const queue = [l];
          while (queue.length) {
            const cur = queue.shift();
            for (const r of getRequires(cur)) {
              if (keepOn.has(r)) continue;
              keepOn.add(r);
              const parent = layersInfo.find(x => x.name === r);
              if (parent) queue.push(parent);
            }
          }
          for (const other of layers) {
            if (!keepOn.has(other.name)) {
              if (activeState[other.name]) radioCleared.push(other);
              activeState[other.name] = false;
            }
          }
          for (const n of keepOn) {
            activeState[n] = true;
            activated.push(n);
          }
        }

        // Fallbacks for radio-cleared layers (e.g. ArmL05's requires_groups
        // repopulating ArmR when replaced by a regular ArmL). Suppress per
        // the combined excludes_groups of the activators so e.g. Arms01
        // replacing ArmL05 still keeps ArmR/ArmL bare.
        const suppression = new Set();
        for (const n of activated) {
          const me = layersInfo.find(x => x.name === n);
          if (me?.excludes_groups) for (const g of me.excludes_groups) suppression.add(g);
        }
        applyClearedFallbacks(radioCleared, [...suppression]);

        for (const n of activated) {
          enforceExclusions(n);
          autoEnableDependents(n);
        }

        enforceDeps();
        updateUI();
        renderPreview();
      };
      opts.appendChild(btn);
    }

    div.appendChild(opts);
    if (advancedMode && isFacialGroup(groupPath)) {
      div.appendChild(buildAdvancedSliders(groupPath));
    }
    container.appendChild(div);
  }
}

const AXIS_CONFIG = {
  dx:     { label: 'X', title: 'X offset',         default: 0, min: -1000, max: 1000, sliderMin: -200, sliderMax: 200, step: 1,    decimals: 0 },
  dy:     { label: 'Y', title: 'Y offset',         default: 0, min: -1000, max: 1000, sliderMin: -200, sliderMax: 200, step: 1,    decimals: 0 },
  scale:  { label: 'S', title: 'Scale',            default: 1, min: 0.3,   max: 3.0,  sliderMin: 0.5,  sliderMax: 1.5, step: 0.01, decimals: 2 },
  rotate: { label: 'R', title: 'Rotation (°)',     default: 0, min: -180,  max: 180,  sliderMin: -30,  sliderMax: 30,  step: 1,    decimals: 0 },
};

function buildAdvancedSliders(groupPath) {
  const wrap = document.createElement('div');
  wrap.className = 'group-advanced';
  if (!groupOffsets[groupPath]) groupOffsets[groupPath] = {};
  const off = groupOffsets[groupPath];
  for (const a of Object.keys(AXIS_CONFIG)) {
    if (off[a] === undefined) off[a] = AXIS_CONFIG[a].default;
  }
  const inputs = {};
  const values = {};

  function set(axis, v) {
    const cfg = AXIS_CONFIG[axis];
    if (Number.isNaN(v)) return;
    v = Math.max(cfg.min, Math.min(cfg.max, v));
    v = parseFloat((Math.round(v / cfg.step) * cfg.step).toFixed(cfg.decimals));
    if (off[axis] === v) return;
    off[axis] = v;
    inputs[axis].value = v;
    values[axis].value = v.toFixed(cfg.decimals);
    renderPreview();
  }

  for (const axis of Object.keys(AXIS_CONFIG)) {
    const cfg = AXIS_CONFIG[axis];
    const row = document.createElement('div');
    row.className = 'slider-row';

    const label = document.createElement('label');
    label.textContent = cfg.label;
    label.title = cfg.title;

    const dec = document.createElement('button');
    dec.className = 'slider-step';
    dec.textContent = '−';
    dec.onclick = () => set(axis, off[axis] - cfg.step);

    const input = document.createElement('input');
    input.type = 'range';
    input.min = String(cfg.sliderMin);
    input.max = String(cfg.sliderMax);
    input.step = String(cfg.step);
    input.value = off[axis];
    input.addEventListener('input', () => set(axis, parseFloat(input.value)));
    inputs[axis] = input;

    const inc = document.createElement('button');
    inc.className = 'slider-step';
    inc.textContent = '+';
    inc.onclick = () => set(axis, off[axis] + cfg.step);

    const value = document.createElement('input');
    value.type = 'number';
    value.min = String(cfg.min);
    value.max = String(cfg.max);
    value.step = String(cfg.step);
    value.className = 'slider-value';
    value.value = off[axis].toFixed(cfg.decimals);
    value.addEventListener('input', () => {
      const v = parseFloat(value.value);
      if (!Number.isNaN(v)) set(axis, v);
    });
    value.addEventListener('blur', () => { value.value = off[axis].toFixed(cfg.decimals); });
    values[axis] = value;

    row.appendChild(label);
    row.appendChild(dec);
    row.appendChild(input);
    row.appendChild(inc);
    row.appendChild(value);
    wrap.appendChild(row);
  }

  const resetBtn = document.createElement('button');
  resetBtn.className = 'slider-reset';
  resetBtn.textContent = 'Reset';
  resetBtn.onclick = () => {
    for (const axis of Object.keys(AXIS_CONFIG)) set(axis, AXIS_CONFIG[axis].default);
  };
  wrap.appendChild(resetBtn);

  return wrap;
}

function updateUI() {
  // Update preset buttons — preset is active iff currently-on facial layers
  // (within applyPreset's scope: same head, controllable) equal the preset
  // exactly. Looser "every" matching falsely highlights when extras are on.
  const facialKeywords = ['Eyes', 'Mouth', 'Cheeks', 'Pale', 'Sweat', 'Mask'];
  const isFacial = name => facialKeywords.some(k => name.includes(k));
  const isControllable = l => {
    const info = getClipInfo(l.name);
    return !info || info.target === 'canvas';
  };
  const facialOnNames = new Set(
    layersInfo
      .filter(l => isFacial(l.name)
        && (!activeHead || l.group.includes(activeHead))
        && isControllable(l)
        && activeState[l.name])
      .map(l => l.name)
  );
  for (const btn of document.querySelectorAll('#presets .preset-btn')) {
    const enabled = compositions[btn.dataset.preset];
    if (!enabled || enabled.length === 0) { btn.classList.remove('active'); continue; }
    const enabledSet = new Set(enabled);
    const matches = enabled.every(n => activeState[n])
      && [...facialOnNames].every(n => enabledSet.has(n));
    btn.classList.toggle('active', matches);
  }
  // Update layer buttons
  for (const btn of document.querySelectorAll('.layer-btn')) {
    const layer = layersInfo.find(l => l.name === btn.dataset.layer);
    const reqMet = !layer || getRequires(layer).every(r => !!activeState[r]);
    btn.disabled = !reqMet;
    btn.classList.toggle('active', !!activeState[btn.dataset.layer]);
  }
  // Update none buttons
  for (const btn of document.querySelectorAll('.none-btn')) {
    const group = btn.dataset.group;
    const anyActive = layersInfo.some(l =>
      getDisplayGroup(l) === group && !isAlwaysOnClipMask(l) && activeState[l.name]);
    btn.classList.toggle('active', !anyActive);
  }
  // Update group status labels
  for (const span of document.querySelectorAll('.group-status')) {
    const group = span.dataset.statusGroup;
    const active = layersInfo.find(l =>
      getDisplayGroup(l) === group && !isAlwaysOnClipMask(l) && activeState[l.name]);
    span.textContent = active ? ` — ${active.name}` : '';
  }
}

// --- Rendering ---

// Image cache to avoid reloading on every render
const imageCache = {};

function loadLayerImage(charName, layerName) {
  const key = `${charName}/${layerName}`;
  if (imageCache[key]) return imageCache[key];
  const promise = new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = `characters/${charName}/${layerName}.png?v=${cacheBust}`;
  });
  imageCache[key] = promise;
  return promise;
}

function invalidateImageCache() {
  for (const key in imageCache) delete imageCache[key];
}

async function compositeToCanvas(layers, canvasW, canvasH) {
  // Load all images in parallel
  const entries = await Promise.all(layers.map(async l => ({
    layer: l,
    img: await loadLayerImage(currentChar, l.name),
    clip: getClipInfo(l.name),
  })));

  const canvas = document.createElement('canvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');

  const normalLayers = entries.filter(e => !e.clip && e.img);
  const allMasks = entries.filter(e =>
    e.clip && e.img && (!e.clip.head || activeHead === null || e.clip.head === activeHead));

  // Three mask categories, each with its own placement on the main timeline:
  //  - canvas-target  : multiply over the entire main canvas at their own z-order.
  //  - pass-through   : non-canvas source-over masks. Drawn as normal layers at
  //                     their own z-order; the `target` field is metadata only,
  //                     no per-layer transformation. (Source-over has no clipping
  //                     behavior in canvas2D — it just draws normally — so a pool
  //                     would just hijack the blit z-order without changing pixels.)
  //  - transform      : non-canvas dest-out / pool-multiply. Applied per-layer:
  //                     each affected layer is pre-rendered to a tile with the
  //                     masks baked in, then drawn at the layer's own z-order.
  //                     This preserves z-order interleaving with non-target
  //                     layers — the previous pool model collapsed them onto a
  //                     single blit z-order which broke when pool layers
  //                     bracketed non-pool layers (e.g. Cheeks below Eyes below
  //                     Sweat, with all three in the 'facial' target).
  const canvasMasks = allMasks.filter(m => m.clip.target === 'canvas');
  const passThroughMasks = allMasks.filter(m =>
    m.clip.target !== 'canvas' && m.clip.blendMode === 'source-over');
  const transformMasks = allMasks.filter(m =>
    m.clip.target !== 'canvas' && m.clip.blendMode !== 'source-over');

  // Group transform masks by target, sorted by z-order ascending so that
  // applying them in array order matches their natural composition order.
  const masksByTarget = new Map();
  for (const m of transformMasks) {
    if (!masksByTarget.has(m.clip.target)) masksByTarget.set(m.clip.target, []);
    masksByTarget.get(m.clip.target).push(m);
  }
  for (const arr of masksByTarget.values()) {
    arr.sort((a, b) => a.layer.order - b.layer.order);
  }

  const TARGET_PRIORITY = ['eyes', 'facial'];
  function assignTarget(layer) {
    for (const t of TARGET_PRIORITY) {
      if (masksByTarget.has(t) && isInClipTarget(layer, t)) return t;
    }
    return null;
  }

  // Compute the overlap rectangle between a sprite at (offsetX, offsetY) of
  // size (mw, mh) and a destination canvas of size (tileW, tileH). Returns
  // null if there is no overlap. `dx,dy` are the destination top-left and
  // `sx,sy,w,h` are the slice of the mask source to read.
  function clipRegion(offsetX, offsetY, mw, mh, tileW, tileH) {
    const dx = Math.max(0, offsetX);
    const dy = Math.max(0, offsetY);
    const sx = Math.max(0, -offsetX);
    const sy = Math.max(0, -offsetY);
    const w = Math.min(mw - sx, tileW - dx);
    const h = Math.min(mh - sy, tileH - dy);
    if (w <= 0 || h <= 0) return null;
    return { dx, dy, sx, sy, w, h };
  }

  // Per-pixel multiply on an arbitrary 2D context. Cmul = Cb · (αs·Cs + (1-αs));
  // αout = αb. Outside the mask (αs=0) the pixel is untouched. `lightness` lerps
  // the result toward white where the mask is active. The mask sprite is drawn
  // with its top-left at (offsetX, offsetY); for canvas-sized masks (no `pos`)
  // the offset is (0, 0) and behaviour matches the pre-pos schema exactly.
  function applyMultiplyMask(targetCtx, mask, offsetX = 0, offsetY = 0) {
    const strength = clippingData[mask.layer.name]?.strength ?? 1;
    const lightness = clippingData[mask.layer.name]?.lightness ?? 0;
    const lInv = 1 - lightness;
    const lW = lightness * 255;
    const mw = mask.img.width, mh = mask.img.height;
    const r = clipRegion(offsetX, offsetY, mw, mh, targetCtx.canvas.width, targetCtx.canvas.height);
    if (!r) return;
    const maskTmp = document.createElement('canvas');
    maskTmp.width = r.w;
    maskTmp.height = r.h;
    const mtCtx = maskTmp.getContext('2d');
    mtCtx.drawImage(mask.img, r.sx, r.sy, r.w, r.h, 0, 0, r.w, r.h);
    const pd = targetCtx.getImageData(r.dx, r.dy, r.w, r.h);
    const md = mtCtx.getImageData(0, 0, r.w, r.h);
    const p = pd.data, mm = md.data;
    for (let i = 0; i < p.length; i += 4) {
      if (p[i + 3] === 0) continue;
      const as = (mm[i + 3] / 255) * strength;
      if (as === 0) continue;
      const k = 1 - as;
      p[i]     = p[i]     * (as * mm[i]     / 255 + k) * lInv + lW;
      p[i + 1] = p[i + 1] * (as * mm[i + 1] / 255 + k) * lInv + lW;
      p[i + 2] = p[i + 2] * (as * mm[i + 2] / 255 + k) * lInv + lW;
    }
    targetCtx.putImageData(pd, r.dx, r.dy);
  }

  // Per-pixel screen on an arbitrary 2D context. Cout = Cb + αs·Cs·(255-Cb)/255;
  // αout = αb. Black mask (Cs=0) and αs=0 are no-ops.
  function applyScreenMask(targetCtx, mask, offsetX = 0, offsetY = 0) {
    const strength = clippingData[mask.layer.name]?.strength ?? 1;
    const mw = mask.img.width, mh = mask.img.height;
    const r = clipRegion(offsetX, offsetY, mw, mh, targetCtx.canvas.width, targetCtx.canvas.height);
    if (!r) return;
    const maskTmp = document.createElement('canvas');
    maskTmp.width = r.w;
    maskTmp.height = r.h;
    const mtCtx = maskTmp.getContext('2d');
    mtCtx.drawImage(mask.img, r.sx, r.sy, r.w, r.h, 0, 0, r.w, r.h);
    const pd = targetCtx.getImageData(r.dx, r.dy, r.w, r.h);
    const md = mtCtx.getImageData(0, 0, r.w, r.h);
    const p = pd.data, mm = md.data;
    for (let i = 0; i < p.length; i += 4) {
      if (p[i + 3] === 0) continue;
      const as = (mm[i + 3] / 255) * strength;
      if (as === 0) continue;
      p[i]     = p[i]     + as * mm[i]     * (255 - p[i])     / 255;
      p[i + 1] = p[i + 1] + as * mm[i + 1] * (255 - p[i + 1]) / 255;
      p[i + 2] = p[i + 2] + as * mm[i + 2] * (255 - p[i + 2]) / 255;
    }
    targetCtx.putImageData(pd, r.dx, r.dy);
  }

  // Built-in compositing for source-over / destination-out (exact, AA-safe).
  // Mask is drawn at its native size with its top-left at (offsetX, offsetY).
  function applyBuiltinMask(targetCtx, mask, offsetX = 0, offsetY = 0) {
    const strength = clippingData[mask.layer.name]?.strength
      ?? (mask.clip.blendMode === 'destination-out' ? 0.5 : 1);
    targetCtx.globalCompositeOperation = mask.clip.blendMode;
    targetCtx.globalAlpha = strength;
    targetCtx.drawImage(mask.img, offsetX, offsetY);
    targetCtx.globalAlpha = 1;
    const opacity = clippingData[mask.layer.name]?.opacity ?? 1;
    if (opacity < 1) {
      targetCtx.globalCompositeOperation = 'destination-out';
      targetCtx.globalAlpha = 1 - opacity;
      targetCtx.drawImage(mask.img, offsetX, offsetY);
      targetCtx.globalAlpha = 1;
    }
    targetCtx.globalCompositeOperation = 'source-over';
  }

  // Anchor used by Advanced-mode scale/rotate: sprite center in canvas space.
  function getLayerAnchor(entry) {
    const [px, py] = getPos(entry.layer);
    return { ax: px + entry.img.width / 2, ay: py + entry.img.height / 2 };
  }

  function drawLayerImg(targetCtx, entry, applyOffset = false) {
    const off = applyOffset ? getLayerOffset(entry.layer) : { dx: 0, dy: 0, scale: 1, rotate: 0 };
    const [px, py] = getPos(entry.layer);
    targetCtx.globalCompositeOperation = 'source-over';
    if (off.scale === 1 && off.rotate === 0) {
      targetCtx.drawImage(entry.img, px + off.dx, py + off.dy);
    } else {
      const a = getLayerAnchor(entry);
      targetCtx.save();
      targetCtx.translate(off.dx + a.ax, off.dy + a.ay);
      if (off.rotate) targetCtx.rotate(off.rotate * Math.PI / 180);
      if (off.scale !== 1) targetCtx.scale(off.scale, off.scale);
      targetCtx.translate(-a.ax, -a.ay);
      targetCtx.drawImage(entry.img, px, py);
      targetCtx.restore();
    }
  }

  // Pre-render each transform-target layer into a sprite-sized tile, baking
  // its masks in. The tile represents canvas region (lx, ly)..(lx+lw, ly+lh);
  // masks are drawn at offset (mx-lx, my-ly).
  function prerenderLayer(entry) {
    const target = assignTarget(entry.layer);
    if (!target) return null;
    const masks = masksByTarget.get(target);
    const [lx, ly] = getPos(entry.layer);
    const tmp = document.createElement('canvas');
    tmp.width = entry.img.width;
    tmp.height = entry.img.height;
    const tCtx = tmp.getContext('2d');
    tCtx.drawImage(entry.img, 0, 0);
    for (const mask of masks) {
      const [mx, my] = getPos(mask.layer);
      const ox = mx - lx, oy = my - ly;
      if (mask.clip.blendMode === 'multiply') {
        applyMultiplyMask(tCtx, mask, ox, oy);
      } else {
        applyBuiltinMask(tCtx, mask, ox, oy);
      }
    }
    return { tile: tmp, x: lx, y: ly };
  }

  const layerEvents = normalLayers.map(e => ({
    type: 'layer',
    order: e.layer.order,
    entry: e,
    tile: prerenderLayer(e),
  }));

  const mainEvents = [
    ...layerEvents,
    ...passThroughMasks.map(m => ({ type: 'pass-mask', order: m.layer.order, mask: m })),
    ...canvasMasks.map(m => ({ type: 'canvas-mask', order: m.layer.order, mask: m })),
  ].sort((a, b) => a.order - b.order);

  for (const ev of mainEvents) {
    if (ev.type === 'layer') {
      if (ev.tile) {
        const off = getLayerOffset(ev.entry.layer);
        const t = ev.tile;
        ctx.globalCompositeOperation = 'source-over';
        if (off.scale === 1 && off.rotate === 0) {
          ctx.drawImage(t.tile, t.x + off.dx, t.y + off.dy);
        } else {
          const a = getLayerAnchor(ev.entry);
          ctx.save();
          ctx.translate(off.dx + a.ax, off.dy + a.ay);
          if (off.rotate) ctx.rotate(off.rotate * Math.PI / 180);
          if (off.scale !== 1) ctx.scale(off.scale, off.scale);
          ctx.translate(-a.ax, -a.ay);
          ctx.drawImage(t.tile, t.x, t.y);
          ctx.restore();
        }
      } else {
        drawLayerImg(ctx, ev.entry, true);
      }
    } else if (ev.type === 'pass-mask') {
      const [mx, my] = getPos(ev.mask.layer);
      applyBuiltinMask(ctx, ev.mask, mx, my);
    } else {
      // canvas-mask: multiply (darken) or screen (lighten) over the composite
      const [mx, my] = getPos(ev.mask.layer);
      if (ev.mask.clip.blendMode === 'screen') {
        applyScreenMask(ctx, ev.mask, mx, my);
      } else {
        applyMultiplyMask(ctx, ev.mask, mx, my);
      }
    }
  }

  ctx.globalCompositeOperation = 'source-over';
  return canvas;
}

let renderSeq = 0;
async function renderPreview() {
  const seq = ++renderSeq;
  const container = document.getElementById('previewContainer');

  const activeLayers = layersInfo
    .filter(l => activeState[l.name])
    .sort((a, b) => a.order - b.order);

  const canvasW = layersInfo.length > 0 ? (layersInfo[0]._canvasW || 2500) : 2500;
  const canvasH = layersInfo.length > 0 ? (layersInfo[0]._canvasH || 5000) : 5000;

  const canvas = await compositeToCanvas(activeLayers, canvasW, canvasH);
  // Discard if a newer render started while we were compositing — keeps the
  // visible canvas consistent with the latest activeState and avoids stale
  // overwrites when the user clicks rapidly.
  if (seq !== renderSeq) return;

  canvas.style.width = '100%';
  canvas.style.height = 'auto';
  container.replaceChildren(canvas);

  updateUI();
}

// --- Export ---

document.getElementById('exportBtn').onclick = async () => {
  const activeLayers = layersInfo
    .filter(l => activeState[l.name])
    .sort((a, b) => a.order - b.order);

  if (activeLayers.length === 0) return;

  const canvasW = layersInfo[0]._canvasW || 2500;
  const canvasH = layersInfo[0]._canvasH || 5000;

  const canvas = await compositeToCanvas(activeLayers, canvasW, canvasH);

  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `${currentChar}_${Date.now()}.png`;
  a.click();

  // Feedback
  const btn = document.getElementById('exportBtn');
  const orig = btn.textContent;
  btn.textContent = 'Exported!';
  btn.classList.add('exported');
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('exported');
  }, 1200);
};

// --- Reset ---

document.getElementById('resetBtn').onclick = () => {
  resetToDefault();
  groupOffsets = {};
  enforceDeps();
  if (advancedMode) buildGroups();
  updateUI();
  renderPreview();
};

document.getElementById('advancedToggle').onclick = (e) => {
  advancedMode = !advancedMode;
  e.currentTarget.classList.toggle('active', advancedMode);
  buildGroups();
  updateUI();
};

// --- Init ---

const charSelect = document.getElementById('charSelect');
for (const c of CHARACTERS) {
  const opt = document.createElement('option');
  opt.value = c;
  opt.textContent = c;
  charSelect.appendChild(opt);
}
charSelect.value = 'Sherry';
charSelect.onchange = () => loadCharacter(charSelect.value);

loadCharacter('Sherry');

// --- Zoom & Pan ---

let zoomLevel = 1;
let panX = 0, panY = 0;
let isDragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
const container = document.getElementById('previewContainer');
const previewArea = document.getElementById('previewArea');

function applyTransform() {
  container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
}

function zoom(delta, centerX, centerY) {
  const oldZoom = zoomLevel;
  zoomLevel = Math.min(8, Math.max(0.25, zoomLevel * (1 + delta)));
  // Adjust pan to zoom toward cursor/center
  const ratio = zoomLevel / oldZoom;
  panX = centerX - ratio * (centerX - panX);
  panY = centerY - ratio * (centerY - panY);
  applyTransform();
}

// Scroll wheel zoom
previewArea.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = previewArea.getBoundingClientRect();
  const cx = e.clientX - rect.left - rect.width / 2;
  const cy = e.clientY - rect.top - rect.height / 2;
  zoom(e.deltaY > 0 ? -0.15 : 0.15, cx, cy);
}, { passive: false });

// Button zoom
document.getElementById('zoomIn').onclick = () => { zoom(0.3, 0, 0); };
document.getElementById('zoomOut').onclick = () => { zoom(-0.3, 0, 0); };
document.getElementById('zoomReset').onclick = () => { zoomLevel = 1; panX = 0; panY = 0; applyTransform(); };
document.getElementById('bgToggle').onclick = () => { previewArea.classList.toggle('bg-white'); };

// Pan with mouse drag
previewArea.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
  container.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  container.classList.remove('dragging');
});
</script>
