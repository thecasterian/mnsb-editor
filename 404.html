<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — MNSB Character Editor</title>
<style>
  :root {
    --bg-deep: #121214;
    --bg-card: #26262d;
    --accent: #ff6b4a;
    --text: #e8e6e3;
    --text-muted: #8a8a8e;
    --border: #333338;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: radial-gradient(ellipse at 50% 60%, #1e1e24 0%, #0a0a0c 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .panel {
    max-width: 460px;
  }
  .code {
    font-size: 96px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 16px 0 8px;
  }
  p {
    color: var(--text-muted);
    line-height: 1.5;
    margin: 0 0 24px;
  }
  .home {
    display: inline-block;
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-size: 14px;
    transition: background 0.15s;
  }
  .home:hover { background: #ff8266; }

  .twitter-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(28, 28, 33, 0.85);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 50%;
    text-decoration: none;
    transition: all 0.15s;
  }
  .twitter-btn:hover { background: var(--bg-card); color: var(--text); }
  .twitter-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<a class="twitter-btn" href="https://twitter.com/thecasterian" target="_blank" rel="noopener noreferrer" aria-label="Twitter @thecasterian" title="@thecasterian">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/>
  </svg>
</a>

<div class="panel">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a class="home" href="/">Back to the editor</a>
</div>

</body>
</html>
